version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: hospital_bi_redis
    restart: unless-stopped
    ports:
      - "6380:6379"   # porta alternativa — 6379 em uso pelo gdp-redis
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hospital_bi_rabbitmq
    restart: unless-stopped
    ports:
      - "5673:5672"    # AMQP (alternativa — 5672 em uso pelo gdp-rabbitmq)
      - "15673:15672"  # Management UI: http://localhost:15673
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  redis_data:
    driver: local
  rabbit_data:
    driver: local
